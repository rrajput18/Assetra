<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Gold Gradient Definition -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>

  <!-- Ground Line -->
  <line x1="6" y1="42" x2="42" y2="42" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Left building (shorter) -->
  <rect x="13" y="18" width="10" height="24" rx="2" stroke="url(#goldGrad)" stroke-width="2" stroke-linejoin="round" />
  <!-- Left Building Windows -->
  <line x1="16" y1="23" x2="20" y2="23" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="28" x2="20" y2="28" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="33" x2="20" y2="33" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="38" x2="20" y2="38" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Right building (taller) -->
  <rect x="25" y="10" width="10" height="32" rx="2" stroke="url(#goldGrad)" stroke-width="2" stroke-linejoin="round" />
  <!-- Right Building Windows -->
  <line x1="28" y1="15" x2="32" y2="15" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="20" x2="32" y2="20" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="25" x2="32" y2="25" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="30" x2="32" y2="30" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="28" y1="35" x2="32" y2="35" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Taller building spire -->
  <line x1="30" y1="4" x2="30" y2="10" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
</svg>
